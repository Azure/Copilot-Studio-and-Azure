# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# Azure Developer CLI (azd) manifest for the Voice Channel accelerator.
#
# Usage:
#   azd init            # one-time environment setup
#   azd auth login
#   azd up              # provisions infra + builds/pushes server image + deploys
#
# The `server` service is packaged as a container image and deployed to the
# Azure Container App provisioned by infra/main.bicep. The container app is
# tagged with `azd-service-name: server` so azd knows which resource hosts it.

name: voice-channel
metadata:
  template: voice-channel@1.0.0

services:
  server:
    project: ./server
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: .
